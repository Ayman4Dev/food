<svg width="600" height="200" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff7a18; stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff3d00; stop-opacity:1" />
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <circle cx="100" cy="100" r="70" fill="url(#grad)" />

  <line x1="30" y1="80" x2="70" y2="80" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <line x1="20" y1="100" x2="70" y2="100" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <line x1="30" y1="120" x2="70" y2="120" stroke="white" stroke-width="5" stroke-linecap="round"/>

  <text x="190" y="115"
        font-family="Arial, Helvetica, sans-serif"
        font-size="64"
        font-weight="bold"
        fill="url(#grad)"
        filter="url(#shadow)"
        letter-spacing="2">
        FOOD RUSH
  </text>

</svg>
